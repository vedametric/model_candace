<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Candace — message queue</title>
<style>
  :root{ --bg:#0b0b0d; --card:#15151a; --line:#26262e; --muted:#8a8a93; --txt:#ececf0;
         --wait:#e0a73a; --sent:#33c06a; --super:#6a6a76; --flight:#3d8bff; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--txt);
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  header{ padding:18px 20px 10px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header h1{ font-size:18px; margin:0; font-weight:700; }
  header .sub{ color:var(--muted); font-size:12.5px; }
  .pills{ margin-left:auto; display:flex; gap:8px; }
  .pill{ font-size:12px; padding:5px 11px; border-radius:999px; background:var(--card); border:1px solid var(--line); }
  .pill b{ font-weight:700; }
  .pill.w b{ color:var(--wait); } .pill.s b{ color:var(--sent); } .pill.x b{ color:var(--super); }
  .wrap{ padding:6px 14px 40px; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{ text-align:left; color:var(--muted); font-weight:600; font-size:11.5px; text-transform:uppercase;
      letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--line); }
  td{ padding:11px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  tr:hover td{ background:#101015; }
  .user{ font-weight:600; }
  .msg{ color:#c9c9d2; max-width:280px; }
  .reply{ color:#9fe6bb; max-width:280px; font-style:italic; }
  .mono{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
  .badge{ display:inline-block; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:6px; }
  .b-wait{ background:rgba(224,167,58,.14); color:var(--wait); }
  .b-sent{ background:rgba(51,192,106,.14); color:var(--sent); }
  .b-super{ background:rgba(106,106,118,.18); color:#b6b6c0; }
  .b-flight{ background:rgba(61,139,255,.16); color:var(--flight); }
  .cd{ font-weight:700; }
  .dim{ color:var(--muted); }
  .empty{ text-align:center; color:var(--muted); padding:50px 0; }
  .err{ color:#e0654b; font-size:12.5px; padding:0 20px 8px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--sent); display:inline-block; margin-right:6px;
        animation:p 1.6s infinite; } @keyframes p{ 0%,100%{opacity:.35} 50%{opacity:1} }
</style>
</head>
<body>
  <header>
    <div>
      <h1>candace — message queue</h1>
      <div class="sub"><span class="dot"></span>live · what's come in, the delay she picked, and when it sent</div>
    </div>
    <div class="pills">
      <div class="pill w">waiting <b id="cw">0</b></div>
      <div class="pill s">sent <b id="cs">0</b></div>
      <div class="pill x">debounced <b id="cx">0</b></div>
    </div>
  </header>
  <div class="err" id="err"></div>
  <div class="wrap">
    <table>
      <thead><tr>
        <th>queued</th><th>user</th><th>incoming message</th><th>delay</th><th>status</th><th>sends in / reply</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty">no messages yet. send candace a dm and it'll appear here.</div>
  </div>

<script>
  const API = "https://automations.vedametric.com.au/webhook/candace-queue";
  const rowsEl = document.getElementById('rows');
  const emptyEl = document.getElementById('empty');
  const errEl = document.getElementById('err');
  let model = [];   // reconciled rows

  function fmtClock(iso){
    try { const d = new Date(iso); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }
    catch(e){ return ''; }
  }
  function fmtDur(sec){
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec/60), s = sec%60;
    return m + ':' + String(s).padStart(2,'0');
  }

  function reconcile(events){
    // index dm_sent by fan_id|msg_count
    const sent = {};
    const queuedByFan = {};
    events.forEach(e => {
      const p = e.payload || {};
      const key = (e.fan_id) + '|' + (p.msg_count);
      if (e.type === 'dm_sent') sent[key] = { reply: p.reply, at: e.created_at };
      if (e.type === 'dm_queued') {
        (queuedByFan[e.fan_id] = queuedByFan[e.fan_id] || []).push(p.msg_count);
      }
    });
    const maxCount = {};
    Object.keys(queuedByFan).forEach(f => { maxCount[f] = Math.max.apply(null, queuedByFan[f]); });

    const rows = events.filter(e => e.type === 'dm_queued').map(e => {
      const p = e.payload || {};
      const key = e.fan_id + '|' + p.msg_count;
      let status;
      if (sent[key]) status = 'sent';
      else if (p.msg_count < maxCount[e.fan_id]) status = 'superseded';
      else status = 'pending'; // waiting or in-flight, decided live by clock
      return {
        fan_id: e.fan_id, count: p.msg_count,
        user: p.username || ('fan ' + e.fan_id),
        msg: p.msg || '',
        delay: p.delay_sec, queued_at: p.queued_at || e.created_at,
        scheduled_for: p.scheduled_for,
        status, reply: sent[key] ? sent[key].reply : '', sent_at: sent[key] ? sent[key].at : ''
      };
    });
    // newest first by queued_at
    rows.sort((a,b) => new Date(b.queued_at) - new Date(a.queued_at));
    return rows;
  }

  function render(){
    const now = Date.now();
    let cw=0, cs=0, cx=0;
    rowsEl.innerHTML = '';
    model.forEach(r => {
      let badge, last;
      if (r.status === 'sent'){
        cs++; badge = '<span class="badge b-sent">sent</span>';
        last = '<span class="reply">' + escapeHtml(r.reply || '') + '</span>';
      } else if (r.status === 'superseded'){
        cx++; badge = '<span class="badge b-super">debounced</span>';
        last = '<span class="dim">newer message replaced this one</span>';
      } else {
        const sched = r.scheduled_for ? new Date(r.scheduled_for).getTime() : now;
        const ms = sched - now;
        if (ms > 0){
          cw++; badge = '<span class="badge b-wait">waiting</span>';
          last = '<span class="cd mono">' + fmtDur(ms/1000) + '</span>';
        } else if (now - sched < 90000){
          cw++; badge = '<span class="badge b-flight">generating…</span>';
          last = '<span class="dim mono">any second</span>';
        } else {
          cx++; badge = '<span class="badge b-super">no reply</span>';
          last = '<span class="dim">never sent (aborted or error)</span>';
        }
      }
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="mono dim">' + fmtClock(r.queued_at) + '</td>' +
        '<td class="user">' + escapeHtml(r.user) + '</td>' +
        '<td class="msg">' + escapeHtml(r.msg) + '</td>' +
        '<td class="mono">' + fmtDur(r.delay || 0) + '</td>' +
        '<td>' + badge + '</td>' +
        '<td>' + last + '</td>';
      rowsEl.appendChild(tr);
    });
    document.getElementById('cw').textContent = cw;
    document.getElementById('cs').textContent = cs;
    document.getElementById('cx').textContent = cx;
    emptyEl.style.display = model.length ? 'none' : 'block';
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function poll(){
    try {
      const res = await fetch(API, { cache:'no-store' });
      const data = await res.json();
      model = reconcile((data && data.events) ? data.events : []);
      errEl.textContent = '';
      render();
    } catch(e){ errEl.textContent = 'could not reach queue api: ' + e.message; }
  }

  poll();
  setInterval(poll, 3000);   // refresh data every 3s
  setInterval(render, 1000); // tick countdowns every 1s
</script>
</body>
</html>
