<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Candace — test chat</title>
<style>
  :root{ --bg:#fff; --rcv:#f1f1f3; --snd:#2d6cff; --snd2:#7a4dff; --muted:#8a8a8f; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0b0b0d; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .phone{ max-width:430px; margin:0 auto; height:100dvh; background:var(--bg); display:flex; flex-direction:column; position:relative; }
  .hdr{ display:flex; align-items:center; gap:10px; padding:14px 14px 10px; border-bottom:1px solid #ececec; }
  .back{ font-size:22px; color:#111; width:24px; }
  .av{ width:40px; height:40px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #f4d9b0, #d9a978 60%, #b07f57); flex:0 0 auto; }
  .who{ line-height:1.15; }
  .who b{ font-size:16px; }
  .who span{ font-size:12px; color:var(--muted); }
  .hdr .menu{ margin-left:auto; color:#111; font-size:20px; }
  .settings{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:8px 14px; background:#fafafa; border-bottom:1px solid #eee; font-size:12px; color:var(--muted); }
  .settings select{ border:1px solid #ddd; border-radius:8px; padding:5px 8px; font-size:12px; max-width:210px; background:#fff; }
  .settings input{ border:1px solid #ddd; border-radius:8px; padding:5px 8px; font-size:12px; width:120px; }
  .settings button{ border:1px solid #ddd; background:#fff; border-radius:8px; padding:5px 9px; font-size:12px; cursor:pointer; }
  .settings button:active{ background:#eee; }
  .msgs{ flex:1; overflow-y:auto; padding:16px 12px 10px; display:flex; flex-direction:column; gap:8px; }
  .row{ display:flex; align-items:flex-end; gap:8px; max-width:100%; }
  .row.me{ justify-content:flex-end; }
  .row .sav{ width:28px; height:28px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #f4d9b0, #d9a978 60%, #b07f57); flex:0 0 auto; }
  .bubble{ padding:10px 14px; border-radius:20px; font-size:15.5px; line-height:1.35; max-width:75%; word-wrap:break-word; white-space:pre-wrap; }
  .her .bubble{ background:var(--rcv); color:#111; border-bottom-left-radius:6px; }
  .me .bubble{ background:linear-gradient(135deg,var(--snd),var(--snd2)); color:#fff; border-bottom-right-radius:6px; }
  .dots{ display:inline-flex; gap:4px; padding:3px 0; }
  .dots i{ width:7px; height:7px; border-radius:50%; background:#b9b9bf; animation:b 1.2s infinite; }
  .dots i:nth-child(2){ animation-delay:.2s } .dots i:nth-child(3){ animation-delay:.4s }
  @keyframes b{ 0%,60%,100%{ transform:translateY(0); opacity:.5 } 30%{ transform:translateY(-4px); opacity:1 } }
  .day{ text-align:center; font-size:11px; color:var(--muted); margin:6px 0; }
  .composer{ display:flex; align-items:center; gap:10px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid #ececec; }
  .composer input{ flex:1; border:none; background:#f1f1f3; border-radius:22px; padding:12px 16px; font-size:15.5px; outline:none; }
  .composer button{ border:none; background:none; color:var(--snd); font-weight:700; font-size:15.5px; cursor:pointer; }
  .composer button:disabled{ color:#bbb; }
  .err{ color:#c0392b; font-size:12px; text-align:center; padding:4px; }
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="back">‹</div>
    <div class="av"></div>
    <div class="who"><b>candace summers</b><br><span id="status">Active now</span></div>
    <div class="menu">⋯</div>
  </div>

  <div class="settings">
    <select id="userpick" title="resume a past conversation">
      <option value="">— resume a past chat —</option>
    </select>
    <button id="refresh" title="reload list">↻</button>
    <span>or new:</span>
    <input id="username" />
    <button id="newchat" title="fresh fan / clean memory">new chat</button>
  </div>

  <div class="msgs" id="msgs">
    <div class="day">today</div>
  </div>

  <div class="err" id="err"></div>

  <div class="composer">
    <input id="text" placeholder="Message..." autocomplete="off" />
    <button id="send">Send</button>
  </div>
</div>

<script>
  const BASE = "https://automations.vedametric.com.au/webhook";
  const WEBHOOK = BASE + "/13efd976-70bb-4a0d-9af9-30333abf6262";
  const msgs = document.getElementById('msgs');
  const input = document.getElementById('text');
  const sendBtn = document.getElementById('send');
  const errEl = document.getElementById('err');
  const userField = document.getElementById('username');
  const userPick = document.getElementById('userpick');
  const statusEl = document.getElementById('status');

  function randomUser(){ return 'web_' + Math.random().toString(36).slice(2,8); }
  userField.value = randomUser();

  function scroll(){ msgs.scrollTop = msgs.scrollHeight; }
  function clearChat(){ msgs.innerHTML = '<div class="day">today</div>'; }

  function addBubble(text, who){
    const row = document.createElement('div');
    row.className = 'row ' + (who === 'me' ? 'me' : 'her');
    if (who === 'her'){ const av = document.createElement('div'); av.className = 'sav'; row.appendChild(av); }
    const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
    row.appendChild(b);
    msgs.appendChild(row); scroll();
  }
  function showTyping(){
    const row = document.createElement('div'); row.className = 'row her'; row.id = 'typing';
    row.innerHTML = '<div class="sav"></div><div class="bubble"><span class="dots"><i></i><i></i><i></i></span></div>';
    msgs.appendChild(row); scroll();
  }
  function hideTyping(){ const t = document.getElementById('typing'); if (t) t.remove(); }

  async function loadUsers(){
    try {
      const res = await fetch(BASE + '/candace-users');
      const data = await res.json();
      const users = (data && data.users) ? data.users : [];
      userPick.innerHTML = '<option value="">— resume a past chat —</option>';
      users.forEach(u => {
        const o = document.createElement('option');
        o.value = u.username;
        const score = (u.score === null || u.score === undefined) ? '' : (' · ' + u.score);
        const stage = u.stage ? (' · ' + u.stage) : '';
        o.textContent = u.username + ' (' + (u.msg_count||0) + ' msgs' + score + stage + ')';
        userPick.appendChild(o);
      });
    } catch(e){ errEl.textContent = 'could not load past chats: ' + e.message; }
  }

  async function loadHistory(username){
    errEl.textContent = '';
    statusEl.textContent = 'loading…';
    clearChat();
    try {
      const res = await fetch(BASE + '/candace-history?username=' + encodeURIComponent(username));
      const data = await res.json();
      const m = (data && data.messages) ? data.messages : [];
      if (!m.length) addBubble('(no history yet for ' + username + ')', 'her');
      m.forEach(x => addBubble(x.content, x.role === 'user' ? 'me' : 'her'));
    } catch(e){ errEl.textContent = 'could not load history: ' + e.message; }
    statusEl.textContent = 'Active now';
    input.focus();
  }

  async function send(){
    const text = input.value.trim();
    if (!text) return;
    errEl.textContent = '';
    addBubble(text, 'me');
    input.value = '';
    sendBtn.disabled = true;
    statusEl.textContent = 'typing…';
    showTyping();
    const u = (userField.value || 'webtester').toLowerCase();
    const url = WEBHOOK + '?last_text_input=' + encodeURIComponent(text)
      + '&username=' + encodeURIComponent(u) + '&display=' + encodeURIComponent('Web Tester');
    try {
      const res = await fetch(url, { method:'GET' });
      const data = await res.json();
      hideTyping();
      addBubble((data && data.message) ? data.message : '(no reply)', 'her');
    } catch (e){
      hideTyping();
      errEl.textContent = 'could not reach the webhook: ' + e.message;
    } finally {
      sendBtn.disabled = false;
      statusEl.textContent = 'Active now';
      input.focus();
    }
  }

  // events
  userPick.addEventListener('change', () => {
    const u = userPick.value;
    if (!u) return;
    userField.value = u;
    loadHistory(u);
  });
  document.getElementById('refresh').addEventListener('click', loadUsers);
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter'){ e.preventDefault(); send(); } });
  document.getElementById('newchat').addEventListener('click', () => {
    userField.value = randomUser();
    userPick.value = '';
    clearChat();
    errEl.textContent = '';
    input.focus();
  });

  loadUsers();
  input.focus();
</script>
</body>
</html>
